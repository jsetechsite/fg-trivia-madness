<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Gang Trivia Madness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Bangers&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-dark: #0a0a12;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            user-select: none;
        }

        .fun-font {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            box-shadow: 0 0 20px var(--neon-pink);
            border-color: transparent;
        }

        .timer-bar {
            height: 8px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            width: 100%;
        }

        .sprite {
            position: absolute;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 1;
            filter: drop-shadow(0 0 5px white);
            will-change: transform, left, top;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center top;
            animation: gridScroll 20s linear infinite;
        }

        @keyframes gridScroll {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: rgba(0, 243, 255, 0.6);
            background: linear-gradient(transparent, rgba(10, 10, 18, 0.8));
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div id="sprite-container"></div>
    <canvas id="confetti-canvas"></canvas>

    <main class="relative z-10 flex items-center justify-center h-screen p-4">
        
        <!-- Start Screen -->
        <div id="start-screen" class="glass-panel p-10 max-w-xl w-full text-center space-y-6 fade-in">
            <h1 class="fun-font text-6xl md:text-8xl text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 italic">
                FOOD GANG<br>TRIVIA MADNESS
            </h1>
            <p class="text-cyan-300 tracking-widest text-sm uppercase">Are you legendary enough?</p>
            <button onclick="startGame()" class="mt-8 px-10 py-4 bg-transparent border-2 border-cyan-400 text-cyan-400 font-bold rounded-full hover:bg-cyan-400 hover:text-black transition-all duration-300 shadow-[0_0_20px_rgba(0,243,255,0.5)] fun-font text-2xl">
                ENTER THE VOID
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden glass-panel p-6 md:p-10 max-w-3xl w-full">
            <div class="flex justify-between items-center mb-6">
                <div class="text-xs uppercase tracking-widest text-pink-500 font-bold">
                    Question <span id="current-index-display">1</span> / 15
                </div>
                <div class="text-xs uppercase tracking-widest text-cyan-400 font-bold" id="score-counter">
                    Score: 0
                </div>
            </div>

            <div class="w-full bg-gray-800 rounded-full h-2 mb-8 overflow-hidden">
                <div id="timer-bar" class="timer-bar"></div>
            </div>

            <h2 id="question-text" class="text-2xl md:text-3xl font-bold mb-8 text-center leading-tight min-h-[80px]"></h2>

            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden glass-panel p-10 max-w-xl w-full text-center">
            <h2 class="fun-font text-5xl text-pink-500 mb-4">GAME OVER</h2>
            <div id="final-stats" class="text-xl space-y-2 mb-8"></div>
            <div id="rank-badge" class="inline-block px-6 py-2 bg-cyan-400 text-black font-bold rounded-lg mb-8 fun-font text-xl"></div>
            <button onclick="handleRestart()" class="block w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition-colors">
                PLAY AGAIN
            </button>
        </div>
    </main>

    <footer>
        Copyright 2026 | game collaboration of Jim(@jimsedric) and Red(@rosaindica)
    </footer>

    <script>
        const rawData = {
            "questionnaires": [
                { "question": "What is the name of the Food Gang pug that does taxes?", "options": ["Edgar the Pug", "Benny the Pug", "Oscar the Pug", "Pablo the Pug"], "answer": "Edgar the Pug" },
                { "question": "What is the name of the Food gang duck with 1,000 cousins?", "options": ["Howard", "Donald", "Quincy", "Waddles"], "answer": "Howard" },
                { "question": "Who is the alien that controls Jim's brain?", "options": ["Mr Slime", "Zorg", "Blorb", "Xenon"], "answer": "Mr Slime" },
                { "question": "Who heals and makes a good magical potion?", "options": ["Mr and Mrs Snot", "Professor Goo", "Dr Mist", "The Slime Twins"], "answer": "Mr and Mrs Snot" },
                { "question": "What is the name of the cat that smells like a bomb when it goes to the litter box?", "options": ["Dr. Openheimer the Third", "Boomer", "Whiskers", "Stinky"], "answer": "Dr. Openheimer the Third" },
                { "question": "Which is BK's favorite K-pop boy band?", "options": ["BTS", "TXT", "BTS & TXT", "EXO"], "answer": "BTS & TXT" },
                { "question": "Which is NOT one of the Rons?", "options": ["Boyband Ron", "Anime Ron", "Ronald Dlanor", "None of the above"], "answer": "None of the above" },
                { "question": "What is the name of the Food Gang duck (Howard) given to Lisaa?", "options": ["Martha", "Lucy", "Clara", "Daisy"], "answer": "Martha" },
                { "question": "How many planets are in the Solar System?", "options": ["7", "8", "9", "10"], "answer": "8" },
                { "question": "What is the name of the Food Gang member considered a legend who is sometimes AFK on the lake?", "options": ["Josh", "Mark", "Leo", "Finn"], "answer": "Josh" },
                { "question": "Which Food Gang member appears and makes everyone play the song 'Sometimes I'm Alone' by Kiffness?", "options": ["Neco", "Milo", "Rex", "Toby"], "answer": "Neco" },
                { "question": "What is 6 plus 7?", "options": ["11", "12", "13", "14"], "answer": "13" },
                { "question": "Who is the First Ms Fashionista of the Food Gang Awards Night 2025?", "options": ["Red", "BK", "Neco", "Ron"], "answer": "Red" },
                { "question": "What is the name of the Food Gang character who always messes with the Wi-Fi/network?", "options": ["Mr Neighbor", "Techno Ron", "Lag Master", "Router King"], "answer": "Mr Neighbor" },
                { "question": "What is the name of Ron's white Food Gang dog?", "options": ["Baa", "Snow", "Cloud", "Mochi"], "answer": "Baa" },
                { "question": "Where will V throw you if you mess with V?", "options": ["The Sea", "The Lake", "The Void", "The Mountains"], "answer": "The Sea" },
                { "question": "What item does Das like to steal, eat, or collect?", "options": ["Pants", "Shoes", "Hats", "Socks"], "answer": "Pants" },
                { "question": "Fill in the blank: \"Dancing with ______ love, it feels so right...\"", "options": ["Dolphin", "Ocean", "Starlight", "You"], "answer": "Dolphin" },
                { "question": "What is the largest planet in our Solar System?", "options": ["Earth", "Jupiter", "Saturn", "Mars"], "answer": "Jupiter" },
                { "question": "Which ocean is the largest on Earth?", "options": ["Atlantic Ocean", "Indian Ocean", "Pacific Ocean", "Arctic Ocean"], "answer": "Pacific Ocean" },
                { "question": "How many continents are there?", "options": ["5", "6", "7", "8"], "answer": "7" },
                { "question": "What gas do plants absorb from the atmosphere?", "options": ["Oxygen", "Carbon Dioxide", "Nitrogen", "Hydrogen"], "answer": "Carbon Dioxide" },
                { "question": "What is the capital of Japan?", "options": ["Seoul", "Tokyo", "Kyoto", "Osaka"], "answer": "Tokyo" },
                { "question": "Which animal is known as the King of the Jungle?", "options": ["Tiger", "Elephant", "Lion", "Leopard"], "answer": "Lion" },
                { "question": "How many days are there in a leap year?", "options": ["364", "365", "366", "367"], "answer": "366" },
                { "question": "What is H2O commonly known as?", "options": ["Salt", "Hydrogen", "Water", "Oxygen"], "answer": "Water" },
                { "question": "Which planet is known as the Red Planet?", "options": ["Venus", "Mars", "Mercury", "Jupiter"], "answer": "Mars" },
                { "question": "What is the fastest land animal?", "options": ["Cheetah", "Lion", "Horse", "Greyhound"], "answer": "Cheetah" }
            ]
        };

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let timer = null;
        let timeLeft = 10;
        let playerAnswers = [];
        let isProcessing = false;

        // Confetti Logic
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resizeCanvas;
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = Math.random() * 10 + 5;
                this.speedX = Math.random() * 20 - 10;
                this.speedY = Math.random() * -20 - 5;
                this.gravity = 0.5;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function createConfetti() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.y > canvas.height) particles.splice(index, 1);
            });
            if (particles.length > 0) requestAnimationFrame(animateConfetti);
        }

        // Audio Management
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, volume = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            click: () => playTone(440, 'sine', 0.1),
            correct: () => { playTone(600, 'sine', 0.2); setTimeout(() => playTone(800, 'sine', 0.3), 100); },
            wrong: () => playTone(150, 'sawtooth', 0.4),
            tick: (isEmergency) => playTone(isEmergency ? 1200 : 800, 'square', 0.03, isEmergency ? 0.1 : 0.04),
            tada: () => {
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                notes.forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.5, 0.1), i * 150));
            }
        };

        function spawnSprites() {
            const emojis = ['🍔', '🍕', '🐱', '🐶', '👽', '🦆', '🐸', '🍩', '🌮', '🤖'];
            const container = document.getElementById('sprite-container');
            for(let i = 0; i < 12; i++) {
                const sprite = document.createElement('div');
                sprite.className = 'sprite animate-float';
                sprite.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                sprite.style.left = Math.random() * 90 + '%';
                sprite.style.top = Math.random() * 90 + '%';
                sprite.style.animationDelay = Math.random() * 5 + 's';
                sprite.style.opacity = '0.3';
                container.appendChild(sprite);
                
                setInterval(() => {
                    sprite.style.left = Math.random() * 90 + '%';
                    sprite.style.top = Math.random() * 90 + '%';
                    sprite.style.transition = 'all ' + (5 + Math.random() * 5) + 's linear';
                }, 5000);
            }
        }

        function startGame() {
            initAudio();
            sounds.click();
            
            currentQuestions = [...rawData.questionnaires]
                .sort(() => Math.random() - 0.5)
                .slice(0, 15);
            
            currentIndex = 0;
            score = 0;
            playerAnswers = [];
            isProcessing = false;
            
            try { localStorage.removeItem('foodGangAnswers'); } catch(e) {}

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            showQuestion();
        }

        function showQuestion() {
            if (currentIndex >= currentQuestions.length) return endGame();

            isProcessing = false;
            const q = currentQuestions[currentIndex];
            
            document.getElementById('current-index-display').innerText = currentIndex + 1;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('score-counter').innerText = `Score: ${score}`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            [...q.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn glass-panel p-4 text-left border border-white/10 rounded-xl';
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(opt);
                container.appendChild(btn);
            });

            const quizPanel = document.getElementById('quiz-screen');
            quizPanel.classList.remove('fade-in');
            void quizPanel.offsetWidth;
            quizPanel.classList.add('fade-in');

            resetTimer();
        }

        function resetTimer() {
            if (timer) clearInterval(timer);
            timeLeft = 10;
            const bar = document.getElementById('timer-bar');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            void bar.offsetWidth;
            bar.style.transition = 'width 10s linear';
            bar.style.width = '0%';

            timer = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) sounds.tick(timeLeft <= 3);
                if (timeLeft < 0) {
                    clearInterval(timer);
                    selectAnswer(null); 
                }
            }, 1000);
        }

        function selectAnswer(choice) {
            if (isProcessing) return;
            isProcessing = true;
            if (timer) clearInterval(timer);

            const q = currentQuestions[currentIndex];
            const isCorrect = choice === q.answer;

            if (isCorrect) {
                score += 10;
                sounds.correct();
            } else if (choice !== null) {
                sounds.wrong();
            }

            playerAnswers.push({
                question: q?.question || "Unknown",
                selected: choice || "TIME OUT",
                correct: q?.answer || "Unknown",
                isCorrect: isCorrect
            });

            try { localStorage.setItem('foodGangAnswers', JSON.stringify(playerAnswers)); } catch(e) {}

            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 300);
        }

        function endGame() {
            if (timer) clearInterval(timer);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('fade-in');

            const stats = document.getElementById('final-stats');
            stats.innerHTML = `
                <p class="text-4xl text-cyan-300 font-bold mb-2">${score} / 150</p>
                <p class="text-sm opacity-70 uppercase tracking-widest">Global Rank calculated...</p>
            `;

            const rank = document.getElementById('rank-badge');
            if (score >= 130) rank.innerText = "FOOD GANG LEGEND";
            else if (score >= 80) rank.innerText = "KITCHEN MASTER";
            else if (score >= 40) rank.innerText = "HUNGRY SQUIRE";
            else rank.innerText = "STINKY LITTER BOX";

            // Celebration!
            if (score > 0) {
                createConfetti();
                sounds.tada();
            }
        }

        function handleRestart() {
            location.reload();
        }

        window.onload = () => {
            spawnSprites();
            setInterval(() => {
                if(!document.getElementById('start-screen').classList.contains('hidden')) {
                    if(audioCtx) playTone(100 + Math.random() * 20, 'sine', 2, 0.01);
                }
            }, 5000);
        };
    </script>
</body>
</html>
